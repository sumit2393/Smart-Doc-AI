name: smart_doc_ai
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  google_mlkit_text_recognition: ^0.13.0
  image_picker: ^1.1.2
  http: ^1.2.1
  flutter_markdown: ^0.7.3
  hive_flutter: ^1.1.0
  flutter_dotenv: ^5.1.0
  google_fonts: ^8.1.0
  image: ^4.1.7 
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
flutter_native_splash:
  color: "#0A0E21"
  image: "assets/icons/app_icon.png"
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icons/